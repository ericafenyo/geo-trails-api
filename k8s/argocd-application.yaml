apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: geo-trails-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ericafenyo/geo-trails-api
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: geo-trails-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
